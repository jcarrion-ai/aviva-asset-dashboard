<title>Aviva Senior Living — Asset Management Dashboard</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #F2F3F5;
  color: #1A2E4A;
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  min-height: 100vh;
  background: #1A2E4A;
  color: #fff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
}

.sidebar-brand {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-brand h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1.3;
}

.sidebar-brand p {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 0;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  font-size: 13.5px;
  color: rgba(255,255,255,0.65);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
  color: #fff;
}

.nav-item.active {
  background: rgba(29,158,117,0.12);
  color: #fff;
  border-left-color: #1D9E75;
}

.nav-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.7;
}

.nav-item.active svg { opacity: 1; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 11px;
  color: rgba(255,255,255,0.35);
}

/* ===== MAIN CONTENT ===== */
.main {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
}

.topbar {
  background: #fff;
  padding: 18px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #E4E7EB;
}

.topbar h2 {
  font-size: 20px;
  font-weight: 700;
  color: #1A2E4A;
}

.topbar-date {
  font-size: 13px;
  color: #7A8699;
}

.content {
  padding: 28px 36px 48px;
}

/* ===== KPI CARDS ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}

.kpi-card {
  background: #fff;
  border-radius: 8px;
  padding: 22px 24px;
  border: 1px solid #E4E7EB;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.kpi-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: #7A8699;
  font-weight: 600;
}

.kpi-value {
  font-size: 30px;
  font-weight: 700;
  color: #1A2E4A;
  line-height: 1.2;
}

.kpi-sub {
  font-size: 12px;
  color: #7A8699;
}

.kpi-sub.positive { color: #1D9E75; }
.kpi-sub.negative { color: #C0392B; }

/* ===== TABLE ===== */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-header h3 {
  font-size: 16px;
  font-weight: 700;
  color: #1A2E4A;
}

.table-wrap {
  background: #fff;
  border-radius: 8px;
  border: 1px solid #E4E7EB;
  overflow: hidden;
  margin-bottom: 32px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  background: #F7F8FA;
  padding: 12px 16px;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #7A8699;
  font-weight: 600;
  text-align: left;
  border-bottom: 1px solid #E4E7EB;
}

tbody td {
  padding: 13px 16px;
  font-size: 13.5px;
  border-bottom: 1px solid #F0F1F3;
  color: #1A2E4A;
}

tbody tr:last-child td { border-bottom: none; }

tbody tr:hover { background: #FAFBFC; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11.5px;
  font-weight: 600;
}

.badge-green { background: rgba(29,158,117,0.1); color: #1D9E75; }
.badge-amber { background: rgba(230,160,40,0.12); color: #B8860B; }
.badge-red   { background: rgba(192,57,43,0.1);  color: #C0392B; }

/* ===== PLACEHOLDER PAGE ===== */
.placeholder-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 55vh;
  text-align: center;
}

.placeholder-page .icon-ring {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(29,158,117,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.placeholder-page .icon-ring svg {
  width: 32px;
  height: 32px;
  color: #1D9E75;
}

.placeholder-page h3 {
  font-size: 22px;
  font-weight: 700;
  color: #1A2E4A;
  margin-bottom: 8px;
}

.placeholder-page p {
  font-size: 14px;
  color: #7A8699;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .sidebar { width: 220px; }
  .main { margin-left: 220px; }
  .kpi-grid { grid-template-columns: 1fr; }
  .content { padding: 20px; }
}
</style>
</head>

/* ===========================================================
   HELPERS
   =========================================================== */
function fmt$(n) {
  if (n == null) return "—";
  const abs = Math.abs(n);
  const sign = n < 0 ? "-" : "";
  if (abs >= 1e9) return sign + "$" + (abs / 1e9).toFixed(2) + "B";
  if (abs >= 1e6) return sign + "$" + (abs / 1e6).toFixed(1) + "M";
  if (abs >= 1e3) return sign + "$" + (abs / 1e3).toFixed(0) + "K";
  return sign + "$" + abs.toLocaleString(undefined, {maximumFractionDigits: 0});
}

function fmt$Exact(n) {
  if (n == null) return "—";
  return "$" + n.toLocaleString(undefined, {maximumFractionDigits: 0});
}

function fmtPct(n) {
  if (n == null) return "—";
  return (n * 100).toFixed(1) + "%";
}

function fmtDate(d) {
  if (!d) return "—";
  const dt = new Date(d);
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function noiBadge(noi) {
  const label = fmt$(noi);
  if (noi > 0) return `<span class="badge badge-green">${label}</span>`;
  if (noi > -200000) return `<span class="badge badge-amber">${label}</span>`;
  return `<span class="badge badge-red">${label}</span>`;
}

function laborVarianceBadge(actual, budget) {
  if (!budget || !actual) return '<span class="badge" style="background:#eee;color:#999">N/A</span>';
  const delta = actual - budget;
  const pct = ((delta / budget) * 100).toFixed(1);
  if (delta <= 0) return `<span class="badge badge-green">${pct}%</span>`;
  if (delta / budget < 0.05) return `<span class="badge badge-amber">+${pct}%</span>`;
  return `<span class="badge badge-red">+${pct}%</span>`;
}

/* ===========================================================
   COMPUTED PORTFOLIO METRICS
   =========================================================== */
function computeKPIs() {
  const props = PORTFOLIO_DATA.properties;
  const totalUnits = props.reduce((s, p) => s + p.units, 0);
  const totalOccupied = props.reduce((s, p) => s + (p.occupiedUnits || 0), 0);
  const totalResidents = props.reduce((s, p) => s + (p.residents || 0), 0);
  // Only count communities with units tracked in WH for occupancy calc
  const occProps = props.filter(p => p.units > 0);
  const occUnits = occProps.reduce((s, p) => s + p.units, 0);
  const occOccupied = occProps.reduce((s, p) => s + (p.occupiedUnits || 0), 0);
  const portfolioOcc = occUnits ? occOccupied / occUnits : null;

  const totalRevenue = props.reduce((s, p) => s + (p.totalRevenue12m || 0), 0);
  const totalExpenses = props.reduce((s, p) => s + (p.totalExpenses12m || 0), 0);
  const totalNOI = props.reduce((s, p) => s + (p.noi12m || 0), 0);
  const totalNetIncome = props.reduce((s, p) => s + (p.netIncome12m || 0), 0);

  const totalLaborActual = props.reduce((s, p) => s + (p.totalLabor12m || 0), 0);
  const totalLaborPTDActual = props.reduce((s, p) => s + (p.laborPTDActual || 0), 0);
  const totalLaborPTDBudget = props.reduce((s, p) => s + (p.laborPTDBudget || 0), 0);
  const laborVarPTD = totalLaborPTDBudget ? ((totalLaborPTDActual - totalLaborPTDBudget) / totalLaborPTDBudget) * 100 : 0;

  const totalAgency = props.reduce((s, p) => s + (p.agencySpend12m || 0), 0);
  const totalMgmtFee = props.reduce((s, p) => s + (p.managementFee12m || 0), 0);
  const noiPositiveCount = props.filter(p => (p.noi12m || 0) > 0).length;
  const latestMonthRev = props.reduce((s, p) => s + (p.latestMonthRevenue || 0), 0);

  return {
    totalUnits, totalOccupied, totalResidents, portfolioOcc,
    totalRevenue, totalExpenses, totalNOI, totalNetIncome,
    totalLaborActual, totalLaborPTDActual, totalLaborPTDBudget, laborVarPTD,
    totalAgency, totalMgmtFee, noiPositiveCount, latestMonthRev,
    totalProperties: props.length
  };
}

      statusHtml = '<span class="badge ' + sc + '" style="white-space:normal;text-align:left;display:inline-block;max-width:200px;line-height:1.3">' + p.debtStatus + '</span>';
    }

    html += `<tr>
      <td style="font-weight:600">${p.name}</td>
      <td style="font-size:0.82em">${p.lender || '—'}</td>
      <td style="text-align:right">${fmt$(p.mortgageBalance)}</td>
      <td style="text-align:right">${partnerMezz > 0 ? fmt$(partnerMezz) : '—'}</td>
      <td style="text-align:right">${fmt$(p.totalLTDebt)}</td>
      <td>${matBadge}</td>
      <td>${statusHtml}</td>
      <td style="text-align:right">${noiBadge(p.noi12m)}</td>
      <td style="text-align:right">${dscrBadge}</td>
    </tr>`;
  }

  const totalMort = props.reduce((s,p)=>s+(p.mortgageBalance||0),0);
  const totalPM = props.reduce((s,p)=>s+(p.partnerLoans||0)+(p.mezzLoan||0),0);

  html += `<tr style="font-weight:700;border-top:2px solid #1A2E4A">
    <td>TOTAL</td><td></td>
    <td style="text-align:right">${fmt$(totalMort)}</td>
    <td style="text-align:right">${fmt$(totalPM)}</td>
    <td style="text-align:right">${fmt$(totalDebt)}</td>
    <td></td><td></td><td></td><td></td>
  </tr></tbody></table></div>`;

  return html;
}

/* ===========================================================
   PORTFOLIO VALUATION
   =========================================================== */
function renderPortfolioValuation() {
  const props = PORTFOLIO_DATA.properties;
  const sorted = [...props].sort((a,b) => (b.noi12m || 0) - (a.noi12m || 0));

  // Use a blended cap rate range for senior housing
  const capRates = { low: 0.07, mid: 0.08, high: 0.09 };

  let html = `
    <div style="background:#fff;border:1px solid #E4E7EB;border-radius:8px;padding:20px;margin-bottom:28px">
      <p style="font-size:13px;color:#7A8699;line-height:1.6">
        <strong style="color:#1A2E4A">Methodology:</strong> Estimated values based on T-12 NOI with cap rates of ${(capRates.low*100).toFixed(0)}% / ${(capRates.mid*100).toFixed(0)}% / ${(capRates.high*100).toFixed(0)}%.
        Properties with negative NOI show cost basis (total debt) as a proxy. These are indicative estimates only — not appraisals.
      </p>
    </div>

    <div class="kpi-grid">`;

  // Portfolio-level totals
  let totalValLow = 0, totalValMid = 0, totalValHigh = 0, totalDebt = 0;
  props.forEach(p => {
    const noi = p.noi12m || 0;
    if (noi > 0) {
      totalValLow += noi / capRates.high;
      totalValMid += noi / capRates.mid;
      totalValHigh += noi / capRates.low;
    } else {
      totalValLow += p.totalLTDebt || 0;
      totalValMid += p.totalLTDebt || 0;
      totalValHigh += p.totalLTDebt || 0;
    }
    totalDebt += p.totalLTDebt || 0;
  });

  html += `
      <div class="kpi-card">
        <span class="kpi-label">Portfolio Value (${(capRates.mid*100).toFixed(0)}% Cap)</span>
        <span class="kpi-value">${fmt$(totalValMid)}</span>
        <span class="kpi-sub">Range: ${fmt$(totalValLow)} – ${fmt$(totalValHigh)}</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Total Debt</span>
        <span class="kpi-value">${fmt$(totalDebt)}</span>
        <span class="kpi-sub">LTV: ${totalValMid > 0 ? ((totalDebt/totalValMid)*100).toFixed(0) + '%' : '—'}</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Equity (est.)</span>
        <span class="kpi-value" style="color:${totalValMid - totalDebt >= 0 ? '#1D9E75' : '#C0392B'}">${fmt$(totalValMid - totalDebt)}</span>
        <span class="kpi-sub">Based on ${(capRates.mid*100).toFixed(0)}% cap rate</span>
      </div>
    </div>

    <div class="section-header"><h3>Property-Level Valuation</h3></div>
    <div class="table-wrap" style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Property</th>
            <th>Type</th>
            <th style="text-align:right">Units</th>
            <th style="text-align:right">NOI (T-12)</th>
            <th style="text-align:right">Value @${(capRates.high*100)}%</th>
            <th style="text-align:right">Value @${(capRates.mid*100)}%</th>
            <th style="text-align:right">Value @${(capRates.low*100)}%</th>
            <th style="text-align:right">Total Debt</th>
            <th style="text-align:right">LTV</th>
            <th style="text-align:right">$/Unit (${(capRates.mid*100)}%)</th>
          </tr>
        </thead>
        <tbody>`;

  for (const p of sorted) {
    const noi = p.noi12m || 0;
    let vLow, vMid, vHigh;
    if (noi > 0) {
      vLow = noi / capRates.high;
      vMid = noi / capRates.mid;
      vHigh = noi / capRates.low;
    } else {
      vLow = p.totalLTDebt || 0;
      vMid = p.totalLTDebt || 0;
      vHigh = p.totalLTDebt || 0;
    }
    const ltv = vMid > 0 ? ((p.totalLTDebt || 0) / vMid) : null;
    const perUnit = p.units > 0 ? vMid / p.units : null;
    const ltvBadge = ltv != null ? (ltv <= 0.65 ? '<span class="badge badge-green">' : ltv <= 0.80 ? '<span class="badge badge-amber">' : '<span class="badge badge-red">') + (ltv*100).toFixed(0) + '%</span>' : '—';

    html += `<tr>
      <td style="font-weight:600">${p.name}</td>
      <td>${p.unitType || '—'}</td>
      <td style="text-align:right">${p.units}</td>
      <td style="text-align:right">${noiBadge(noi)}</td>
      <td style="text-align:right">${noi > 0 ? fmt$(vLow) : '<span style="color:#7A8699;font-style:italic">Debt basis</span>'}</td>
      <td style="text-align:right;font-weight:600">${noi > 0 ? fmt$(vMid) : '<span style="color:#7A8699;font-style:italic">'+fmt$(vMid)+'</span>'}</td>
      <td style="text-align:right">${noi > 0 ? fmt$(vHigh) : '<span style="color:#7A8699;font-style:italic">Debt basis</span>'}</td>
      <td style="text-align:right">${fmt$(p.totalLTDebt)}</td>
      <td style="text-align:right">${ltvBadge}</td>
      <td style="text-align:right">${perUnit ? '$' + Math.round(perUnit).toLocaleString() : '—'}</td>
    </tr>`;
  }

  html += `<tr style="font-weight:700;border-top:2px solid #1A2E4A">
    <td>PORTFOLIO</td><td></td>
    <td style="text-align:right">${props.reduce((s,p)=>s+p.units,0)}</td>
    <td style="text-align:right">${fmt$(props.reduce((s,p)=>s+(p.noi12m||0),0))}</td>
    <td style="text-align:right">${fmt$(totalValLow)}</td>
    <td style="text-align:right">${fmt$(totalValMid)}</td>
    <td style="text-align:right">${fmt$(totalValHigh)}</td>
    <td style="text-align:right">${fmt$(totalDebt)}</td>
    <td style="text-align:right">${totalValMid > 0 ? ((totalDebt/totalValMid)*100).toFixed(0)+'%' : '—'}</td>
    <td style="text-align:right">$${Math.round(totalValMid / props.reduce((s,p)=>s+p.units,0)).toLocaleString()}</td>
  </tr></tbody></table></div>`;

  return html;
}

function renderRentRoll() {

/* ===========================================================
   LABOR VS. BUDGET
   =========================================================== */
function renderLaborBudget() {
  const props = PORTFOLIO_DATA.properties;
  const sorted = [...props].sort((a,b) => {
    const aVar = a.laborPTDBudget ? (a.laborPTDActual - a.laborPTDBudget) / a.laborPTDBudget : 0;
    const bVar = b.laborPTDBudget ? (b.laborPTDActual - b.laborPTDBudget) / b.laborPTDBudget : 0;
    return bVar - aVar; // worst variance first
  });

  const totalLabor12m = props.reduce((s,p) => s + (p.totalLabor12m || 0), 0);
  const totalRev = props.reduce((s,p) => s + (p.totalRevenue12m || 0), 0);
  const laborPctRev = totalRev > 0 ? (totalLabor12m / totalRev) * 100 : 0;
  const totalAgency = props.reduce((s,p) => s + (p.agencySpend12m || 0), 0);
  const totalPTDActual = props.reduce((s,p) => s + (p.laborPTDActual || 0), 0);
  const totalPTDBudget = props.reduce((s,p) => s + (p.laborPTDBudget || 0), 0);
  const ptdVar = totalPTDBudget > 0 ? ((totalPTDActual - totalPTDBudget) / totalPTDBudget * 100) : 0;
  const totalMTDActual = props.reduce((s,p) => s + (p.laborMTDActual || 0), 0);
  const totalMTDBudget = props.reduce((s,p) => s + (p.laborMTDBudget || 0), 0);

  let html = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <span class="kpi-label">Total Labor (T-12)</span>
        <span class="kpi-value">${fmt$(totalLabor12m)}</span>
        <span class="kpi-sub">${laborPctRev.toFixed(1)}% of revenue</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">PTD Variance (Jan–Feb 2026)</span>
        <span class="kpi-value" style="color:${ptdVar <= 0 ? '#1D9E75' : ptdVar < 5 ? '#B8860B' : '#C0392B'}">${ptdVar >= 0 ? '+' : ''}${ptdVar.toFixed(1)}%</span>
        <span class="kpi-sub">${fmt$(totalPTDActual)} actual vs ${fmt$(totalPTDBudget)} budget</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Agency Spend (T-12)</span>
        <span class="kpi-value">${fmt$(totalAgency)}</span>
        <span class="kpi-sub">${totalLabor12m > 0 ? ((totalAgency/totalLabor12m)*100).toFixed(1) + '% of labor' : '—'}</span>
      </div>
    </div>

    <div class="section-header"><h3>Labor Detail by Property</h3></div>
    <div class="table-wrap" style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Property</th>
            <th style="text-align:right">Labor (T-12)</th>
            <th style="text-align:right">% of Rev</th>
            <th style="text-align:right">MTD Actual</th>
            <th style="text-align:right">MTD Budget</th>
            <th style="text-align:right">MTD Var</th>
            <th style="text-align:right">PTD Actual</th>
            <th style="text-align:right">PTD Budget</th>
            <th style="text-align:right">PTD Var</th>
            <th style="text-align:right">Agency (T-12)</th>
          </tr>
        </thead>
        <tbody>`;

  for (const p of sorted) {
    const laborPct = p.totalRevenue12m > 0 ? ((p.totalLabor12m || 0) / p.totalRevenue12m * 100) : 0;
    const laborPctClass = laborPct <= 55 ? 'badge-green' : laborPct <= 65 ? 'badge-amber' : 'badge-red';

    html += `<tr>
      <td style="font-weight:600">${p.name}</td>
      <td style="text-align:right">${fmt$(p.totalLabor12m)}</td>
      <td style="text-align:right"><span class="badge ${laborPctClass}">${laborPct.toFixed(1)}%</span></td>
      <td style="text-align:right">${fmt$(p.laborMTDActual)}</td>
      <td style="text-align:right">${fmt$(p.laborMTDBudget)}</td>
      <td style="text-align:right">${laborVarianceBadge(p.laborMTDActual, p.laborMTDBudget)}</td>
      <td style="text-align:right">${fmt$(p.laborPTDActual)}</td>
      <td style="text-align:right">${fmt$(p.laborPTDBudget)}</td>
      <td style="text-align:right">${laborVarianceBadge(p.laborPTDActual, p.laborPTDBudget)}</td>
      <td style="text-align:right">${(p.agencySpend12m || 0) > 0 ? fmt$(p.agencySpend12m) : '<span style="color:#1D9E75">$0</span>'}</td>
    </tr>`;
  }

  html += `<tr style="font-weight:700;border-top:2px solid #1A2E4A">
    <td>PORTFOLIO</td>
    <td style="text-align:right">${fmt$(totalLabor12m)}</td>

    <td style="text-align:right">${fmt$(totalMTDActual)}</td>

    <td style="text-align:right">${fmt$(totalPTDActual)}</td>
    <td style="text-align:right">${fmt$(totalPTDBudget)}</td>
    <td style="text-align:right">${laborVarianceBadge(totalPTDActual, totalPTDBudget)}</td>
    <td style="text-align:right">${fmt$(totalAgency)}</td>

  return html;

      <td style="font-weight:600">${p.name}</td>
      <td style="font-size:0.85em;color:#7A8699">${p.location}</td>
      <td>${p.unitType || '—'}</td>
      <td style="text-align:right">${p.units}</td>
      <td style="text-align:right">${p.occupiedUnits || '—'}</td>
      <td style="text-align:right;color:${vac > 10 ? '#C0392B' : '#7A8699'}">${vac}</td>
      <td style="text-align:right">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
          <div style="width:60px;height:8px;background:#F0F1F3;border-radius:4px;overflow:hidden">
            <div style="width:${barWidth}%;height:100%;background:${barColor};border-radius:4px"></div>
          </div>
          <span class="badge ${occBadge}">${fmtPct(p.occupancy)}</span>
        </div>
      </td>
      <td style="text-align:right">${p.residents || '—'}</td>
      <td style="text-align:right">${resPerUnit}</td>
      <td style="text-align:right">${revPerUnit > 0 ? fmt$Exact(revPerUnit) : '—'}</td>
    </tr>`;
  }

  html += `<tr style="font-weight:700;border-top:2px solid #1A2E4A">
    <td>PORTFOLIO</td><td></td><td></td>
    <td style="text-align:right">${totalUnits}</td>
    <td style="text-align:right">${totalOcc}</td>
    <td style="text-align:right">${vacant}</td>
    <td style="text-align:right">${fmtPct(portOcc)}</td>
    <td style="text-align:right">${totalResidents}</td>
    <td style="text-align:right">${avgResPerUnit.toFixed(1)}</td>
    <td style="text-align:right">${fmt$Exact(Math.round((props.reduce((s,p)=>s+(p.totalRevenue12m||0),0))/12/totalOcc))}</td>
  </tr></tbody></table></div>`;

  return html;
}

/* ===========================================================
   CAPITAL EVENTS
   =========================================================== */
function renderCapitalEvents() {
  const props = PORTFOLIO_DATA.properties;

  // Build events timeline from debt status data
  const events = [];
  props.forEach(p => {
    if (!p.debtStatus) return;
    const st = p.debtStatus.toLowerCase();
    const name = p.name.replace('Aviva ','');

    if (st.includes('refinanc') || st.includes('refi')) {
      events.push({
        property: name,
        type: 'Refinance',
        detail: p.debtStatus,
        lender: p.lender,
        amount: p.totalLTDebt,
        maturity: p.debtMaturityDate,
        priority: st.includes('closing') || st.includes('refinanced') ? 1 : 2
      });
    }
    if (st.includes('extension')) {
      events.push({
        property: name,
        type: 'Extension',
        detail: p.debtStatus,
        lender: p.lender,
        amount: p.totalLTDebt,
        maturity: p.debtMaturityDate,
        priority: st.includes('executed') || st.includes('progress') ? 1 : 2
      });
    }
    if (st.includes('workout') || st.includes('special assets')) {
      events.push({
        property: name,
        type: 'Workout',
        detail: p.debtStatus,
        lender: p.lender,
        amount: p.totalLTDebt,
        maturity: p.debtMaturityDate,
        priority: 0
      });
    }
    if (st.includes('bridge')) {
      events.push({
        property: name,
        type: 'Bridge Loan',
        detail: p.debtStatus,
        lender: p.lender,
        amount: p.totalLTDebt,
        maturity: p.debtMaturityDate,
        priority: 1
      });
    }
    if (st.includes('lease-up') || st.includes('originated')) {
      events.push({
        property: name,
        type: 'New/Lease-Up',
        detail: p.debtStatus,
        lender: p.lender,
        amount: p.totalLTDebt,
        maturity: p.debtMaturityDate,
        priority: 3
      });
    }
  });

  events.sort((a,b) => a.priority - b.priority);

  // Summary counts
  const activeRefis = events.filter(e => e.type === 'Refinance').length;
  const extensions = events.filter(e => e.type === 'Extension').length;
  const workouts = events.filter(e => e.type === 'Workout').length;
  const totalCapitalInMotion = events.reduce((s,e) => s + (e.amount || 0), 0);

  let html = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <span class="kpi-label">Active Capital Events</span>
        <span class="kpi-value">${events.length}</span>
        <span class="kpi-sub">${activeRefis} refis, ${extensions} extensions, ${workouts} workouts</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Capital in Motion</span>
        <span class="kpi-value">${fmt$(totalCapitalInMotion)}</span>
        <span class="kpi-sub">Total debt tied to active events</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Critical Watch</span>
        <span class="kpi-value" style="color:#C0392B">${workouts}</span>
        <span class="kpi-sub">${events.filter(e=>e.type==='Workout').map(e=>e.property).join(', ') || 'None'}</span>
      </div>
    </div>

    <div class="section-header"><h3>Active Capital Events</h3></div>
    <div class="table-wrap" style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Property</th>
            <th>Event Type</th>
            <th>Lender / Counterparty</th>
            <th style="text-align:right">Amount</th>
            <th>Maturity / Target</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>`;

  const typeBadge = (type) => {
    const colors = {
      'Refinance': 'badge-amber',
      'Extension': 'badge-amber',
      'Workout': 'badge-red',
      'Bridge Loan': 'badge-amber',
      'New/Lease-Up': 'badge-green'
    };
    return '<span class="badge ' + (colors[type] || 'badge-amber') + '">' + type + '</span>';
  };

  for (const e of events) {
    const matLabel = e.maturity ? new Date(e.maturity).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : '—';
    let statusClass = 'badge-amber';
    const st = e.detail.toLowerCase();
    if (st.includes('closing') || st.includes('refinanced') || st.includes('executed') || st.includes('originated')) statusClass = 'badge-green';
    if (st.includes('workout') || st.includes('special assets')) statusClass = 'badge-red';

    html += `<tr>
      <td style="font-weight:600">${e.property}</td>
      <td>${typeBadge(e.type)}</td>
      <td style="font-size:0.85em">${e.lender || '—'}</td>
      <td style="text-align:right">${fmt$(e.amount)}</td>
      <td>${matLabel}</td>
      <td><span class="badge ${statusClass}" style="white-space:normal;text-align:left;display:inline-block;max-width:220px;line-height:1.3">${e.detail}</span></td>
    </tr>`;
  }

  html += `</tbody></table></div>`;

  // Stable properties section
  const stableProps = props.filter(p => {
    const st = (p.debtStatus || '').toLowerCase();
    return !st.includes('refi') && !st.includes('refinanc') && !st.includes('extension') && !st.includes('workout') && !st.includes('special') && !st.includes('bridge');
  });

  if (stableProps.length > 0) {
    html += `
      <div class="section-header" style="margin-top:12px"><h3>Stable / No Active Events</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Property</th>
            <th>Lender</th>
            <th style="text-align:right">Total Debt</th>
            <th>Maturity</th>
            <th>Status</th>
          </tr></thead>
          <tbody>`;
    for (const p of stableProps) {
      const matLabel = p.debtMaturityDate ? new Date(p.debtMaturityDate).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : '—';
      html += `<tr>
        <td style="font-weight:600">${p.name}</td>
        <td style="font-size:0.85em">${p.lender || '—'}</td>
        <td style="text-align:right">${fmt$(p.totalLTDebt)}</td>
        <td>${matLabel}</td>
        <td>${p.debtStatus || '—'}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  return html;
}

/* ===========================================================
   NAVIGATION
   =========================================================== */
const PAGE_MAP = {
  "portfolio-overview":   { title: "Portfolio Overview",              render: renderPortfolioOverview },
  "debt-maturity":        { title: "Debt & Maturity Tracker",         render: renderDebtMaturity },
  "portfolio-valuation":  { title: "Portfolio Valuation (T-3 / T-6)", render: renderPortfolioValuation },
  "rent-roll":            { title: "Rent Roll Reviews",               render: renderRentRoll },
  "labor-budget":         { title: "Labor vs. Budget",                render: renderLaborBudget },
  "occupancy-tracker":    { title: "Occupancy Tracker",               render: renderOccupancyTracker },
  "capital-events":       { title: "Capital Events",                  render: renderCapitalEvents }
};

function navigateTo(pageId) {
  const page = PAGE_MAP[pageId];
  if (!page) return;

  document.getElementById("pageTitle").textContent = page.title;
  document.getElementById("pageContent").innerHTML = page.render();

  document.querySelectorAll(".nav-item").forEach(el => {
    el.classList.toggle("active", el.dataset.page === pageId);
  });
}

document.getElementById("sidebarNav").addEventListener("click", e => {
  const item = e.target.closest(".nav-item");
  if (item) navigateTo(item.dataset.page);
});

/* ===========================================================
   INIT
   =========================================================== */
document.getElementById("topbarDate").textContent = new Date().toLocaleDateString("en-US", {
  weekday: "long", year: "numeric", month: "long", day: "numeric"
});

navigateTo("portfolio-overview");
</script>
